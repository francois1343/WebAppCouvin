<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Carte Leaflet - Géolocalisation</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
        }

        #map {
            height: 100vh;
        }

        .leaflet-control {
            z-index: 1000;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        const pointsBE = [
            { lat: 50.8503, lng: 4.3517, name: "Bruxelles" },
            { lat: 51.2194, lng: 4.4025, name: "Anvers" },
            { lat: 50.4669, lng: 4.8675, name: "Namur" },
            { lat: 50.6292, lng: 5.5797, name: "Liège" },
            { lat: 51.0543, lng: 3.7174, name: "Gand" },
            { lat: 50.8240, lng: 3.2649, name: "Courtrai" },
            { lat: 50.8798, lng: 4.7005, name: "Louvain" },
            { lat: 50.4114, lng: 4.4445, name: "Charleroi" },
            { lat: 50.4542, lng: 3.9523, name: "Mons" },
            { lat: 50.6051, lng: 3.3893, name: "Tournai" },
            { lat: 50.7376, lng: 5.1072, name: "Hasselt" },
            { lat: 51.0259, lng: 4.4777, name: "Malines" },
            { lat: 50.7184, lng: 4.6115, name: "Wavre" },
            { lat: 50.4795, lng: 4.2416, name: "La Louvière" },
            { lat: 50.4674, lng: 4.8718, name: "Namur centre" },
            { lat: 50.6337, lng: 5.5675, name: "Liège centre" },
            { lat: 51.0325, lng: 3.7099, name: "Gand sud" },
            { lat: 51.0545, lng: 3.7165, name: "Gand nord" },
            { lat: 51.2093, lng: 4.4210, name: "Anvers centre" },
            { lat: 50.4108, lng: 4.4432, name: "Charleroi centre" }
        ];


        const map = L.map('map').setView([50.63, 5.57], 13);


        const markersLayer = L.layerGroup().addTo(map);

        pointsBE.forEach(point => {
            L.marker([point.lat, point.lng]).addTo(markersLayer).bindPopup(point.name)
        })

        map.attributionControl.setPrefix(false);

        // 🗺️ Carte classique
        const osm = L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            { attribution: '&copy; OpenStreetMap' }
        );

        // 🛰️ Carte satellite
        const satellite = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { attribution: 'Tiles &copy; Esri' }
        );

        const baseMaps = {
            "🗺️ Carte classique": osm,
            "🛰️ Satellite": satellite
        };

        const overlays = {
            "📍 Marqueurs": markersLayer
        };

        L.control.layers(baseMaps, overlays, {
            collapsed: false
        }).addTo(map);

        osm.addTo(map);

        // 🧠 Fonction pour créer un marqueur supprimable
        const createDeletableMarker = (latlng, text = "Point") => {
            const marker = L.marker(latlng).addTo(markersLayer);

            const popupContent = `
                <b>${text}</b><br>
                <button class="delete-btn" onclick="deleteMarker(${marker._leaflet_id})">
                    🗑️ Supprimer
                </button>
            `;

            marker.bindPopup(popupContent);

            return marker;
        };

        // 🗑️ Suppression d’un marqueur
        const deleteMarker = (id) => {
            markersLayer.eachLayer(layer => {
                if (layer._leaflet_id === id) {
                    markersLayer.removeLayer(layer);
                }
            });
        };

        // 📍 Marqueur fixe
        createDeletableMarker(
            [50.179428916929524, 4.3583843944368335],
            "Centre ADEPS - Barrages de l'Eau d'Heure"
        );

        // 📍 Géolocalisation
        const onLocationFound = (e) => {
            createDeletableMarker(e.latlng, "Vous êtes ici");
            map.setView(e.latlng, 16);
        };

        const onLocationError = () => {
            alert("Impossible de récupérer votre position");
        };

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);

        map.locate({
            setView: true,
            maxZoom: 16
        });

        // 📍 Ajout au clic
        map.on("click", (e) => {
            createDeletableMarker(e.latlng, "Point cliqué");
        });

    </script>

</body>

</html>
